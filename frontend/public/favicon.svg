<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Card shadow -->
  <rect x="16" y="10" width="36" height="48" rx="4" fill="#1a1a2e" opacity="0.4" transform="rotate(8 34 34)"/>
  <!-- Back card -->
  <rect x="12" y="6" width="36" height="48" rx="4" fill="#16213e" stroke="#e94560" stroke-width="1.5" transform="rotate(-6 30 30)"/>
  <!-- Front card -->
  <rect x="16" y="8" width="36" height="48" rx="4" fill="#0f3460" stroke="#e94560" stroke-width="1.5" transform="rotate(4 34 32)"/>
  <!-- Spade suit on front card -->
  <g transform="translate(28, 22) rotate(4)">
    <path d="M8 2C8 2 0 10 0 14c0 3 2.5 5 5 5 1.8 0 3.2-1 4-2.2v4.2h-2v2h8v-2h-2v-4.2c.8 1.2 2.2 2.2 4 2.2 2.5 0 5-2 5-5 0-4-8-12-8-12z" fill="#e94560"/>
  </g>
  <!-- Pokeball accent line -->
  <line x1="18" y1="56" x2="48" y2="56" stroke="#e94560" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Chip circle -->
  <circle cx="50" cy="14" r="9" fill="#e94560" stroke="#0f3460" stroke-width="2"/>
  <circle cx="50" cy="14" r="5.5" fill="none" stroke="#0f3460" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="50" y="17.5" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0f3460">P</text>
</svg>
